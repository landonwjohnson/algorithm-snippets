name: Site Validation

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    env:
      NEXT_PUBLIC_SITE_ORIGIN: https://landonjohnson.github.io
      NEXT_PUBLIC_REPO_NAME: LeetCodeSwift
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: site/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Generate content
        run: yarn generate-content
      - name: Run tests
        run: yarn test
      - name: Validate metadata and links
        run: yarn validate-seo
      - name: Build
        run: yarn build

  e2e-render-smoke:
    name: E2E Render Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    env:
      NEXT_PUBLIC_SITE_ORIGIN: https://landonjohnson.github.io
      NEXT_PUBLIC_REPO_NAME: LeetCodeSwift
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: site/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Install Playwright Chromium
        run: yarn run playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: yarn test:e2e
